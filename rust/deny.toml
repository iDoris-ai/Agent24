# cargo-deny config — SPEC-001 §9: no GPL/AGPL in the dependency tree.
# CI runs `cargo deny check licenses bans` via EmbarkStudios/cargo-deny-action.

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[advisories]
yanked = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
