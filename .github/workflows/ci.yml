name: CI

on:
  push:
    branches: [main, m1-*, m2-*, m3-*]
  pull_request:
    branches: [main, m1-*, m2-*, m3-*]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-test:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          submodules: false  # vendor/xiaoheishu unnecessary for CI

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
        # Version from package.json packageManager field

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies (skip Electron postinstall download)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
